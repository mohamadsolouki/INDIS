apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.global.domain | replace "." "-" }}-gateway
  labels:
    app: gateway
spec:
  replicas: {{ .Values.gateway.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-gateway-config
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
