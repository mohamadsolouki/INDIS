apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.global.domain | replace "." "-" }}-enrollment
  labels:
    app: enrollment
spec:
  replicas: {{ .Values.enrollment.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: enrollment
  template:
    metadata:
      labels:
        app: enrollment
    spec:
      containers:
        - name: enrollment
          image: "{{ .Values.enrollment.image.repository }}:{{ .Values.enrollment.image.tag }}"
          imagePullPolicy: {{ .Values.enrollment.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: grpc
            - containerPort: 9090
              name: metrics
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-enrollment-config
          resources:
            {{- toYaml .Values.enrollment.resources | nindent 12 }}
