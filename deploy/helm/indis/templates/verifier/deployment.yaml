apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.global.domain | replace "." "-" }}-verifier
  labels:
    app: verifier
spec:
  replicas: {{ .Values.verifier.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: verifier
  template:
    metadata:
      labels:
        app: verifier
    spec:
      containers:
        - name: verifier
          image: "{{ .Values.verifier.image.repository }}:{{ .Values.verifier.image.tag }}"
          imagePullPolicy: {{ .Values.verifier.image.pullPolicy }}
          ports:
            - containerPort: 9110
              name: grpc
            - containerPort: 9111
              name: metrics
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-verifier-config
          resources:
            {{- toYaml .Values.verifier.resources | nindent 12 }}
