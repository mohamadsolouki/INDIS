apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-verifier-config
data:
  GRPC_PORT: "9110"
  METRICS_PORT: "9111"
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
  DATABASE_URL: "postgres://indis:indis@{{ .Values.global.postgres.host }}:{{ .Values.global.postgres.port }}/indis_verifier?sslmode=disable"
  REDIS_URL: "redis://{{ .Values.global.redis.host }}:{{ .Values.global.redis.port }}"
  KAFKA_BROKERS: "{{ .Values.global.kafka.brokers }}"
  GRPC_TLS_MODE: "{{ if .Values.global.tls.enabled }}tls{{ else }}plaintext{{ end }}"
