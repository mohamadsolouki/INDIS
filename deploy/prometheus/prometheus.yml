# Prometheus configuration for local development
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "indis-go-services"
    static_configs:
      - targets:
          - "host.docker.internal:9101"  # identity
          - "host.docker.internal:9102"  # credential
          - "host.docker.internal:9103"  # enrollment
          - "host.docker.internal:9104"  # biometric
          - "host.docker.internal:9105"  # audit
          - "host.docker.internal:9106"  # notification
          - "host.docker.internal:9107"  # electoral
          - "host.docker.internal:9108"  # justice
          - "host.docker.internal:9109"  # gateway
