include:
  - local: '/.gitlab/ci/go.yml'
  - local: '/.gitlab/ci/rust.yml'
  - local: '/.gitlab/ci/python.yml'
  - local: '/.gitlab/ci/security.yml'
  - local: '/.gitlab/ci/deploy-staging.yml'
  - local: '/.gitlab/ci/deploy-prod.yml'

stages:
  - lint
  - test
  - build
  - scan
  - deploy-staging
  - deploy-prod

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  GO_VERSION: "1.23"
  RUST_VERSION: "1.80"
  PYTHON_VERSION: "3.12"
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
