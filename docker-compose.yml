# ============================================================
# INDIS — Local Development Environment
# ============================================================
# Usage:
#   make dev-up    — start all infrastructure services
#   make dev-down  — stop all infrastructure services
# ============================================================

services:
  # ── PostgreSQL (Identity DB) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: indis-postgres
    environment:
      POSTGRES_USER: indis
      POSTGRES_PASSWORD: indis_dev_password
      POSTGRES_DB: indis_identity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Session & Revocation Cache) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: indis-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Apache Kafka (Event Streaming) ─────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: indis-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: indis-dev-cluster-001
    ports:
      - "9092:9092"

  # ── CouchDB (Blockchain State DB — Fabric dev) ─────────────
  couchdb:
    image: couchdb:3
    container_name: indis-couchdb
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpassword
    ports:
      - "5984:5984"

  # ── Prometheus (Metrics) ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: indis-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Grafana (Dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: indis-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  postgres_data:
