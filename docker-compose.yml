# ============================================================
# INDIS — Local Development Environment
# ============================================================
# Usage:
#   make dev-up    — start all infrastructure services
#   make dev-down  — stop all infrastructure services
# ============================================================

services:
  # ── PostgreSQL (Identity DB) ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: indis-postgres
    environment:
      POSTGRES_USER: indis
      POSTGRES_PASSWORD: indis_dev_password
      POSTGRES_DB: indis_identity
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL Read Replica (for load testing & analytics) ──
  # Logical replica of the primary; used by load tests and audit queries
  # to avoid saturating the write primary.  Not started by default —
  # enable with: docker compose --profile loadtest up
  postgres-replica:
    image: postgres:16-alpine
    container_name: indis-postgres-replica
    profiles: [loadtest]
    environment:
      POSTGRES_USER: indis
      POSTGRES_PASSWORD: indis_dev_password
      POSTGRES_DB: indis_identity
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indis"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis (Session & Revocation Cache) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: indis-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Apache Kafka (Event Streaming) ─────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: indis-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: indis-dev-cluster-001
    ports:
      - "9092:9092"

  # ── CouchDB (Blockchain State DB — Fabric dev) ─────────────
  couchdb:
    image: couchdb:3
    container_name: indis-couchdb
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: adminpassword
    ports:
      - "5984:5984"

  # ── Prometheus (Metrics) ───────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: indis-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ── Grafana (Dashboards) ───────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: indis-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

  # ── Jaeger (Distributed Tracing) ──────────────────────────
  # UI:    http://localhost:16686
  # OTLP gRPC collector: localhost:4317
  # OTLP HTTP collector: localhost:4318
  # Set OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4317 in service envs to enable.
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: indis-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  postgres_replica_data:

networks:
  default:
    name: indis-net
