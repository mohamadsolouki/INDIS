name: E2E Tests (Playwright)

on:
  workflow_dispatch:
    inputs:
      live:
        description: "Run against live staging (INDIS_E2E_LIVE=1)"
        type: boolean
        default: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/e2e/playwright
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/playwright/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          INDIS_E2E_LIVE: ${{ github.event.inputs.live == 'true' && '1' || '' }}
          INDIS_DEV_TOKEN: ${{ secrets.INDIS_DEV_TOKEN }}
          INDIS_TEST_VALID_TOKEN: ${{ secrets.INDIS_TEST_VALID_TOKEN }}
          INDIS_TEST_EXPIRED_TOKEN: ${{ secrets.INDIS_TEST_EXPIRED_TOKEN }}
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright/playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-junit
          path: tests/e2e/playwright/playwright-results.xml
          retention-days: 14
