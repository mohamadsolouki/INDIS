.python-cache: &python-cache
  key:
    files:
      - services/ai/poetry.lock
      - services/ai/requirements.txt
  paths:
    - .cache/pip
    - .venv

lint-python:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install ruff
  script:
    - cd services/ai
    - ruff check src/ tests/
    - ruff format --check src/ tests/
  cache:
    <<: *python-cache

test-python:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - pip install -r services/ai/requirements.txt pytest pytest-cov
  script:
    - cd services/ai
    - PYTHONPATH=src pytest tests/ --junitxml=report.xml --cov=src
  cache:
    <<: *python-cache
  artifacts:
    reports:
      junit: services/ai/report.xml
