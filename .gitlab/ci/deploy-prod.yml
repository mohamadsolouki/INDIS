deploy-prod:
  stage: deploy-prod
  image: alpine/helm:latest
  environment:
    name: production
  before_script:
    - apk add --no-cache curl kubectl
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_PROD" > ~/.kube/config
  script:
    - helm upgrade --install indis ./deploy/helm/indis --namespace indis-prod --create-namespace --values ./deploy/helm/indis/values-prod.yaml
  rules:
    - if: $CI_COMMIT_TAG
  when: manual
