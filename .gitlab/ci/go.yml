.go-cache: &go-cache
  key:
    files:
      - go.sum
      - go.work.sum
  paths:
    - .go/pkg/mod/
    - .go/build-cache/

variables:
  GOPATH: $CI_PROJECT_DIR/.go

lint-go:
  stage: lint
  image: golangci/golangci-lint:v1.60-alpine
  script:
    - apk add --no-cache make gcc musl-dev
    - make lint-go
  cache:
    <<: *go-cache

test-go:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add --no-cache make gcc musl-dev
    - make test-go
  cache:
    <<: *go-cache
  artifacts:
    reports:
      junit: coverage/*.xml
    paths:
      - coverage/

build-go:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add --no-cache make gcc musl-dev
    - make build-go
  artifacts:
    paths:
      - bin/
  cache:
    <<: *go-cache
