// INDIS — Credential Service API
// Credential issuance, verification, revocation, and selective disclosure
syntax = "proto3";

package indis.credential.v1;

option go_package = "github.com/IranProsperityProject/INDIS/api/gen/go/credential/v1";

// CredentialService manages W3C Verifiable Credentials 2.0.
service CredentialService {
  // IssueCredential issues a new verifiable credential to a citizen.
  rpc IssueCredential(IssueCredentialRequest) returns (IssueCredentialResponse);

  // VerifyCredential verifies a credential's validity (not revoked, not expired).
  rpc VerifyCredential(VerifyCredentialRequest) returns (VerifyCredentialResponse);

  // RevokeCredential revokes a previously issued credential.
  rpc RevokeCredential(RevokeCredentialRequest) returns (RevokeCredentialResponse);

  // CheckRevocationStatus checks if a credential has been revoked.
  rpc CheckRevocationStatus(CheckRevocationStatusRequest) returns (CheckRevocationStatusResponse);
}

// CredentialType enumerates all INDIS credential types (PRD §FR-002).
enum CredentialType {
  CREDENTIAL_TYPE_UNSPECIFIED = 0;
  CREDENTIAL_TYPE_CITIZENSHIP = 1;
  CREDENTIAL_TYPE_AGE_RANGE = 2;
  CREDENTIAL_TYPE_VOTER_ELIGIBILITY = 3;
  CREDENTIAL_TYPE_RESIDENCY = 4;
  CREDENTIAL_TYPE_PROFESSIONAL = 5;
  CREDENTIAL_TYPE_HEALTH_INSURANCE = 6;
  CREDENTIAL_TYPE_PENSION = 7;
  CREDENTIAL_TYPE_SECURITY_CLEARANCE = 8;
  CREDENTIAL_TYPE_AMNESTY_APPLICANT = 9;
  CREDENTIAL_TYPE_DIASPORA = 10;
  CREDENTIAL_TYPE_SOCIAL_ATTESTATION = 11;
}

message IssueCredentialRequest {
  string subject_did = 1;
  CredentialType type = 2;
  map<string, string> attributes = 3;
  string issuer_did = 4;
}

message IssueCredentialResponse {
  string credential_id = 1;
  string tx_id = 2;
  bytes credential_data = 3;
}

message VerifyCredentialRequest {
  bytes proof = 1;
  bytes verification_key = 2;
  repeated bytes public_inputs = 3;
}

message VerifyCredentialResponse {
  bool valid = 1;
  string reason = 2;
}

message RevokeCredentialRequest {
  string credential_id = 1;
  string reason = 2;
  string revoker_did = 3;
}

message RevokeCredentialResponse {
  string tx_id = 1;
}

message CheckRevocationStatusRequest {
  string credential_id = 1;
}

message CheckRevocationStatusResponse {
  bool revoked = 1;
  string reason = 2;
  string revoked_at = 3;
}
